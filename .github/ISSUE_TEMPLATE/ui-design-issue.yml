name: "🎨 UI / Design Issue"
description: "Something looks wrong or feels wrong — use this for visual, layout, or UX issues."
title: "[UI Feedback] Component — Surface — Device"
labels: []
body:

  - type: dropdown
    id: surface
    attributes:
      label: "Surface / Screen"
      description: "Where does this UI issue appear?"
      options:
        - "Storefront Surface"
        - "Portal Surface"
        - "Landing Surface"
        - "Order Module"
        - "CX Module"
        - "Settings & Config"
        - "Onboarding"
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: "Component"
      description: "Which specific component looks wrong?"
      placeholder: "e.g. Edit Drawer CTA, Pricing Summary card, Widget plan selector"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: "Device"
      options:
        - "Mobile"
        - "Desktop"
        - "Both"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - "High — broken layout blocks user action"
        - "Medium — noticeable but usable"
        - "Low — cosmetic only"
    validations:
      required: true

  - type: input
    id: store
    attributes:
      label: "Store Name"
      placeholder: "e.g. Everpure"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "What it looks like vs what it should look like"
      placeholder: "The CTA button in the Edit Drawer has no padding on mobile — text is clipped on screens under 375px..."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots"
      description: "Attach screenshots — annotate if possible so the dev knows exactly what to look at."
      placeholder: "Drag and drop screenshots here..."
    validations:
      required: true
